name: Nightly Command Center Check

on:
  schedule:
    - cron: '0 6 * * *'  # 1am CST (6am UTC) every night
  workflow_dispatch:       # also allows manual trigger from GitHub Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Run nightly check
        env:
          TURSO_URL: https://command-center-jengrovdahl.aws-us-east-2.turso.io
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: |
          python3 << 'PYEOF'
import urllib.request, json, datetime

TURSO_URL   = "https://command-center-jengrovdahl.aws-us-east-2.turso.io"
TURSO_TOKEN = "${{ secrets.TURSO_TOKEN }}"

def query(sql, args=[]):
    payload = {"requests":[
        {"type":"execute","stmt":{"sql":sql,"args":[
            {"type":"null"} if v is None else {"type":"text","value":str(v)} for v in args
        ]}},{"type":"close"}
    ]}
    req = urllib.request.Request(
        f"{TURSO_URL}/v2/pipeline", data=json.dumps(payload).encode(),
        headers={"Authorization":f"Bearer {TURSO_TOKEN}","Content-Type":"application/json"}, method="POST"
    )
    with urllib.request.urlopen(req) as r:
        data = json.loads(r.read())
    if data["results"][0].get("type")=="error":
        raise Exception(data["results"][0]["error"]["message"])
    return data["results"][0].get("response",{}).get("result")

def add(org, category, title, notes, due_date, assigned_to):
    # check if item with this title already exists
    r = query("SELECT COUNT(*) FROM command_center_items WHERE org=? AND title=?", [org, title])
    cnt = int(r["rows"][0][0]["value"])
    if cnt == 0:
        query("INSERT INTO command_center_items (org,category,title,notes,due_date,assigned_to,completed) VALUES (?,?,?,?,?,?,0)",
              [org, category, title, notes, due_date, assigned_to])
        print(f"  ADDED: {title}")
    else:
        print(f"  exists: {title}")

def patch_done(key):
    r = query(f"SELECT value FROM cc_meta WHERE key='{key}'")
    return bool(r and r.get("rows"))

def mark_patch(key):
    query(f"INSERT OR REPLACE INTO cc_meta (key,value) VALUES ('{key}','done')")

today = datetime.date.today()
month = today.month
day   = today.day
year  = today.year

print(f"Running nightly check: {today}")

# ── TRIMESTER CALENDAR ──
# Tri 1: Jun 1 – Sep 1  |  Tri 2: Sep 1 – Jan 1  |  Tri 3: Jan 1 – Jun 1
def current_tri():
    if month >= 6 and month < 9:  return 1
    if month >= 9 or month < 1:   return 2
    return 3

tri = current_tri()
print(f"Current trimester: {tri}")

# ── 1. SUCCESS report reminder — 3 weeks before trimester closeout ──
# Tri 1 closes Aug 25, Tri 2 closes Dec 25, Tri 3 closes May 1
closeouts = [(8,25,"2026-08-25"), (12,25,"2026-12-25"), (5,1,"2027-05-01")]
for cm, cd, due in closeouts:
    # add reminder 21 days before closeout
    closeout = datetime.date(int(due[:4]), cm, cd)
    remind_date = closeout - datetime.timedelta(days=21)
    if today == remind_date:
        title = f"Submit SUCCESS Tri {tri} report — due {due}"
        add("bpwt","President",title,
            "Collect all LPM trimester reports, compile SUCCESS report, and submit to state by closeout date.",
            due,"Jen")
        add("bpwt","Programming VP",f"Submit Programming Trimester Report Tri {tri} — due {due}",
            "Collect activity info from all LPMs. Submit to State EVP via EmailMe form.\nEmailMe: https://www.emailmeform.com/builder/form/Ixbdc9860vE70",
            due,"Brandy")

# ── 2. Friendship Day reminder (first Sunday in August) ──
if month == 7 and day == 1:  # remind July 1
    # find first Sunday in August
    aug1 = datetime.date(year, 8, 1)
    days_until_sun = (6 - aug1.weekday()) % 7
    friendship_day = aug1 + datetime.timedelta(days=days_until_sun)
    title = f"Friendship Day event — {friendship_day.strftime('%b %d')}"
    add("bpwt","Member/Self",title,
        f"Hold or attend a chapter social event for USWT Friendship Day ({friendship_day}).\\nSubmit certification after event.\\nElectronic form: https://www.emailmeform.com/builder/form/eV878zf0S3Lkf41aFM",
        str(friendship_day),"Jen")

# ── 3. Fast Start reminders — add July 1 if not already there ──
if month == 6 and day == 25:
    key = "nightly_fast_start_reminder_2026"
    if not patch_done(key):
        add("bpwt","Fast Starts","REMINDER: Fast Starts due July 15 — check with all positions",
            "Confirm President, MVP, Secretary, Treasurer, LL LPM Fast Starts are submitted by July 15.\\nAll other LPM Fast Starts due August 1.",
            "2026-07-15","Jen")
        mark_patch(key)

# ── 4. New trimester kickoff — add items for upcoming trimester ──
# Tri 2 kickoff Sep 1
if month == 9 and day == 1:
    key = "nightly_tri2_kickoff"
    if not patch_done(key):
        print("Adding Tri 2 kickoff items...")
        add("bpwt","Membership VP","Submit New Member Adds by Oct 1 — Tri 2",
            "Monthly NMA deadline. Add/Change form + dues to Chapter Service Center.",
            "2026-10-01","Maude")
        add("bpwt","Membership VP","Submit New Member Adds by Nov 1 — Tri 2",
            "Monthly NMA deadline.","2026-11-01","Maude")
        add("bpwt","Membership VP","Submit New Member Adds by Dec 1 — Tri 2",
            "Monthly NMA deadline.","2026-12-01","Maude")
        add("bpwt","Membership VP","Contact Tri 2 members up for renewal",
            "Send Tri 2 renewals by early bird deadline. Personal ask to renew is a must.",
            "2026-10-15","Maude")
        add("bpwt","Treasurer","Submit Tri 2 early bird renewal dues — postmarked Oct 15",
            "Complete Trimester Billing Form + check to Chapter Service Center by Oct 15.",
            "2026-10-15","Lorissa")
        add("bpwt","President","Make donation to MNWT Foundation — Tri 2",
            "Required for SUCCESS (F6). Make chapter donation to MNWT Foundation this trimester.",
            "2026-12-25","Jen")
        add("bpwt","State Delegate","Submit trimester report — Tri 2 due Dec 25",
            "State Delegate submits trimester report. Coordinate with Jen on timing.",
            "2026-12-25","")
        mark_patch(key)

# Tri 3 kickoff Jan 1
if month == 1 and day == 1:
    key = "nightly_tri3_kickoff"
    if not patch_done(key):
        print("Adding Tri 3 kickoff items...")
        add("bpwt","Membership VP","Submit New Member Adds by Feb 1 — Tri 3",
            "Monthly NMA deadline.","2027-02-01","Maude")
        add("bpwt","Membership VP","Submit New Member Adds by Mar 1 — Tri 3",
            "Monthly NMA deadline.","2027-03-01","Maude")
        add("bpwt","Membership VP","Submit New Member Adds by Apr 1 — Tri 3",
            "Monthly NMA deadline.","2027-04-01","Maude")
        add("bpwt","Membership VP","Submit New Member Adds by May 1 — Tri 3",
            "Monthly NMA deadline.","2027-05-01","Maude")
        add("bpwt","Membership VP","Contact Tri 3 members up for renewal",
            "Send Tri 3 renewals by early bird deadline. Personal ask is a must.",
            "2027-01-15","Maude")
        add("bpwt","Treasurer","Submit Tri 3 early bird renewal dues — postmarked Jan 15",
            "Complete Trimester Billing Form + check to Chapter Service Center by Jan 15.",
            "2027-01-15","Lorissa")
        add("bpwt","President","Make donation to MNWT Foundation — Tri 3",
            "Required for SUCCESS (F6).",
            "2027-05-01","Jen")
        add("bpwt","State Delegate","Submit trimester report — Tri 3 due May 1",
            "State Delegate submits trimester report. Coordinate with Jen on timing.",
            "2027-05-01","")
        mark_patch(key)

# ── 5. WoT Week reminder (last full week of September) ──
if month == 9 and day == 7:  # remind ~1 week before
    add("bpwt","Member/Self","Women of Today Week — plan Shout Out With Pride activity",
        "WoT Week is the last full week of September. Hold a public-facing activity.\\nShouot Out With Pride certification: submit to MNWT Marketing Committee Chair.\\nForm: https://mnwt.org/members/forms_categories.php?bofID=16",
        f"{year}-09-28","Jen")

# ── 6. Annual Convention planning reminder ──
if month == 11 and day == 1:
    key = "nightly_convention_planning_2026"
    if not patch_done(key):
        add("bpwt","Convention","Begin Convention 2027 venue and catering contracts",
            "Work with Tevyan to finalize hotel contract, catering quote, and convention budget for May 2027.",
            "2026-12-31","Jen")
        add("bpwt","Convention","Build Convention 2027 committee and assign roles",
            "Co-chairs: Jen + Tevyan. Build out committee: decorations, registration, programming, silent auction, hospitality.",
            None,"Jen")
        mark_patch(key)

print("Nightly check complete.")
PYEOF
