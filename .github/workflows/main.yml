name: Nightly Command Center Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run nightly check
        env:
          TURSO_URL: https://command-center-jengrovdahl.aws-us-east-2.turso.io
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: python3 nightly.py
