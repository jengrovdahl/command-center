// ── Turso ──
async function tursoQuery(sql, args=[]) {
  const res = await fetch(`${TURSO_URL}/v2/pipeline`, {
    method:"POST",
    headers:{ Authorization:`Bearer ${TURSO_TOKEN}`, "Content-Type":"application/json" },
    body: JSON.stringify({ requests:[
      { type:"execute", stmt:{ sql, args: args.map(v => v===null?{type:"null"}:{type:"text",value:String(v)}) } },
      { type:"close" }
    ]})
  });
  const data = await res.json();
  if (data.results?.[0]?.type==="error") throw new Error(data.results[0].error.message);
  return data.results?.[0]?.response?.result;
}

function toObjects(result) {
  if (!result?.rows) return [];
  const cols = result.cols.map(c=>c.name);
  return result.rows.map(row => { const o={}; cols.forEach((c,i)=>{ o[c]=row[i]?.value??null; }); return o; });
}

async function initDB() {
  await tursoQuery(`CREATE TABLE IF NOT EXISTS command_center_items (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    org TEXT NOT NULL, category TEXT NOT NULL, title TEXT NOT NULL,
    notes TEXT, due_date TEXT, assigned_to TEXT,
    completed INTEGER DEFAULT 0, completed_by TEXT, completed_at TEXT,
    created_at TEXT DEFAULT (datetime('now'))
  )`);
  try { await tursoQuery("ALTER TABLE command_center_items ADD COLUMN completed_by TEXT"); } catch(e){}
  try { await tursoQuery("ALTER TABLE command_center_items ADD COLUMN completed_at TEXT"); } catch(e){}
  const bc = parseInt((await tursoQuery("SELECT COUNT(*) FROM command_center_items WHERE org='bpwt'"))?.rows?.[0]?.[0]?.value??"0");
  if (bc===0) for (const i of BPWT_SEED) await tursoQuery("INSERT INTO command_center_items (org,category,title,notes,due_date,assigned_to,completed) VALUES (?,?,?,?,?,?,0)",["bpwt",i.category,i.title,i.notes||null,i.due_date||null,i.assigned_to||null]);
  const tc = parseInt((await tursoQuery("SELECT COUNT(*) FROM command_center_items WHERE org='blossom_thyme'"))?.rows?.[0]?.[0]?.value??"0");
  if (tc===0) for (const i of BT_SEED) await tursoQuery("INSERT INTO command_center_items (org,category,title,notes,due_date,assigned_to,completed) VALUES (?,?,?,?,?,?,0)",["blossom_thyme",i.category,i.title,i.notes||null,i.due_date||null,i.assigned_to||null]);

// ── Helpers ──
function fmtDate(d)     { if(!d) return null; return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function fmtDateTime(d) { if(!d) return null; return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function isOverdue(d)   { return d && new Date(d+"T23:59:59") < new Date(); }
function isSoon(d)      { if(!d) return false; const diff=new Date(d+"T23:59:59")-new Date(); return diff>0&&diff<1000*60*60*24*7; }
function isDone(v)      { return v==="1"||v===1; }
function nowISO()       { return new Date().toISOString(); }

// ── Inline editable field ──
function InlineDate({ value, onChange, color }) {
  const [editing, setEditing] = React.useState(false);
  const [local, setLocal]     = React.useState(value||"");
  const overdue = isOverdue(value);
  const soon    = isSoon(value);

  const commit = () => { setEditing(false); if (local !== (value||"")) onChange(local||null); };

  if (editing) return (
    <input type="date" className="inline-date" value={local}
      onChange={e=>setLocal(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>e.key==="Enter"&&commit()}
      autoFocus
      style={{
        fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,width:"130px",
        background:overdue?"#FEF2F2":soon?"#FFFBEB":"#F5F5F4",
        color:overdue?"#DC2626":soon?"#D97706":"#78716C",
        border:`1.5px solid ${color}`,cursor:"text"
      }}/>
  );

  return (
    <span onClick={()=>{ setLocal(value||""); setEditing(true); }} style={{
      fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:3,
      background:overdue?"#FEF2F2":soon?"#FFFBEB":value?"#F5F5F4":"#F5F5F4",
      color:overdue?"#DC2626":soon?"#D97706":value?"#78716C":"#C4B5A0",
      border:`1px dashed ${value?"transparent":"#D6D3D1"}`
    }}>
      {overdue?"⚠ ":soon?"⏰ ":""}{value ? fmtDate(value) : "Add date"}
    </span>
  );
}

function InlineAssignee({ value, org, onChange, color }) {
  const [editing, setEditing] = React.useState(false);
  const [local, setLocal]     = React.useState(value||"");
  const people = PEOPLE[org]||[];

  const commit = (val) => {
    const v = val !== undefined ? val : local;
    setEditing(false);
    if (v !== (value||"")) onChange(v||null);
  };

  if (editing) return (
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
        {people.map(p=>(
          <button key={p} onMouseDown={()=>commit(p)} style={{
            padding:"3px 10px",borderRadius:99,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
            background:local===p?color:"#F5F5F4",
            color:local===p?"#fff":"#78716C"
          }}>{p}</button>
        ))}
      </div>
      <input className="inline-text" value={local}
        onChange={e=>setLocal(e.target.value)}
        onBlur={()=>commit()}
        onKeyDown={e=>e.key==="Enter"&&commit()}
        placeholder="Other name…"
        autoFocus
        style={{width:120,fontSize:12}}/>
    </div>
  );

  return (
    <span onClick={()=>{ setLocal(value||""); setEditing(true); }} style={{
      fontSize:11,fontWeight:500,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:3,
      color:value?"#78716C":"#C4B5A0",
      borderBottom:`1px dashed ${value?"transparent":"#D6D3D1"}`,
      paddingBottom:1
    }}>
      {value ? `→ ${value}` : "Assign…"}
    </span>
  );
}

function InlineTitle({ value, done, onChange }) {
  const [editing, setEditing] = React.useState(false);
  const [local, setLocal]     = React.useState(value);
  const commit = () => { setEditing(false); if (local.trim() && local !== value) onChange(local.trim()); else setLocal(value); };
  if (editing) return (
    <input className="inline-title" value={local}
      onChange={e=>setLocal(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{ if(e.key==="Enter") commit(); if(e.key==="Escape"){ setLocal(value); setEditing(false); } }}
      autoFocus
      style={{color:"#1C1917"}}/>
  );
  return (
    <p onClick={()=>!done&&setEditing(true)} style={{
      margin:0,fontSize:14,fontWeight:600,lineHeight:1.4,
      color:done?"#A8A29E":"#1C1917",
      textDecoration:done?"line-through":"none",
      cursor:done?"default":"text"
    }}>{value}</p>
  );
}

function App() {
  const [org, setOrg]             = React.useState("bpwt");
  const [items, setItems]         = React.useState([]);
  const [loading, setLoading]     = React.useState(true);
  const [error, setError]         = React.useState(null);
  const [collapsed, setCollapsed] = React.useState({});
  const [filter, setFilter]       = React.useState("open");
  const [modal, setModal]         = React.useState(null);
  const [form, setForm]           = React.useState({});
  const [saving, setSaving]       = React.useState(false);
  const [completeBy, setCompleteBy] = React.useState("");

  const load = React.useCallback(async () => {
    try {
      setLoading(true);
      await initDB();
      const r = await tursoQuery("SELECT * FROM command_center_items ORDER BY completed ASC, due_date ASC, created_at ASC");
      setItems(toObjects(r));
      setError(null);
    } catch(e) { setError(e.message); }
    finally    { setLoading(false); }
  }, []);

  React.useEffect(()=>{ load(); },[load]);

  // ── Inline field savers ──
  const saveField = async (id, field, value) => {
    setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:value}:i));
    await tursoQuery(`UPDATE command_center_items SET ${field}=? WHERE id=?`,[value,id]);
  };

  // ── Completion ──
  const handleCheck = (item) => {
    if (isDone(item.completed)) { uncomplete(item); }
    else { setCompleteBy(item.assigned_to||""); setModal({mode:"complete",item}); }
  };
  const uncomplete = async (item) => {
    setItems(prev=>prev.map(i=>i.id===item.id?{...i,completed:0,completed_by:null,completed_at:null}:i));
    await tursoQuery("UPDATE command_center_items SET completed=0,completed_by=NULL,completed_at=NULL WHERE id=?",[item.id]);
  };
  const confirmComplete = async () => {
    const item=modal.item, by=completeBy.trim()||null, at=nowISO();
    setItems(prev=>prev.map(i=>i.id===item.id?{...i,completed:1,completed_by:by,completed_at:at}:i));
    await tursoQuery("UPDATE command_center_items SET completed=1,completed_by=?,completed_at=? WHERE id=?",[by,at,item.id]);
    setModal(null);
  };

  // ── Add / Edit modal ──
  const openAdd = () => { setForm({org,category:CATEGORIES[org][0],title:"",notes:"",due_date:"",assigned_to:""}); setModal({mode:"add"}); };
  const openEdit = (item) => { setForm({org:item.org,category:item.category,title:item.title,notes:item.notes||"",due_date:item.due_date||"",assigned_to:item.assigned_to||""}); setModal({mode:"edit",item}); };
  const closeModal = () => setModal(null);

  const saveItem = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    try {
      if (modal.mode==="edit") {
        await tursoQuery("UPDATE command_center_items SET org=?,category=?,title=?,notes=?,due_date=?,assigned_to=? WHERE id=?",
          [form.org,form.category,form.title,form.notes||null,form.due_date||null,form.assigned_to||null,modal.item.id]);
      } else {
        await tursoQuery("INSERT INTO command_center_items (org,category,title,notes,due_date,assigned_to,completed) VALUES (?,?,?,?,?,?,0)",
          [form.org,form.category,form.title,form.notes||null,form.due_date||null,form.assigned_to||null]);
      }
      await load(); closeModal();
    } finally { setSaving(false); }
  };

  const deleteItem = async (id) => {
    if (!confirm("Delete this item?")) return;
    await tursoQuery("DELETE FROM command_center_items WHERE id=?",[id]);
    setItems(prev=>prev.filter(i=>i.id!==id));
  };

  const orgItems  = items.filter(i=>i.org===org);
  const filtered  = filter==="all"?orgItems:filter==="open"?orgItems.filter(i=>!isDone(i.completed)):orgItems.filter(i=>isDone(i.completed));
  const cats      = CATEGORIES[org];
  const grouped   = {};
  cats.forEach(c=>{ grouped[c]=filtered.filter(i=>i.category===c); });
  const extra = filtered.filter(i=>!cats.includes(i.category));
  if (extra.length) grouped["Other"]=extra;

  const openCnt   = orgItems.filter(i=>!isDone(i.completed)).length;
  const doneCnt   = orgItems.filter(i=> isDone(i.completed)).length;
  const urgentCnt = orgItems.filter(i=>!isDone(i.completed)&&(isOverdue(i.due_date)||isSoon(i.due_date))).length;
  const oc = ORGS[org];
  const formCats  = CATEGORIES[form.org||org];
  const quickPeople = PEOPLE[modal?.item?.org||org]||[];

  return (
    <div style={{minHeight:"100vh",background:"#F8F7F4",paddingBottom:80}}>

      {/* HEADER */}
      <div style={{background:"#1C1917",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 0"}}>
          <div>
            <p style={{color:"#A8A29E",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",margin:0}}>Jen's</p>
            <h1 style={{color:"#FAFAF9",fontSize:24,fontWeight:800,margin:0,letterSpacing:"-0.03em"}}>Command Center</h1>
          </div>
          <button onClick={openAdd} style={{background:oc.color,color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Add</button>
        </div>
        <div style={{display:"flex",gap:2,padding:"12px 16px 0"}}>
          {Object.entries(ORGS).map(([key,o])=>(
            <button key={key} onClick={()=>setOrg(key)} style={{
              flex:1,padding:"10px 6px",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
              background:org===key?o.color:"transparent",color:org===key?"#fff":"#78716C",
              borderRadius:"8px 8px 0 0",transition:"all 0.15s"
            }}>{o.label}</button>
          ))}
        </div>
      </div>

      {/* STATS */}
      <div style={{background:oc.color,padding:"10px 16px",display:"flex",alignItems:"center",gap:24}}>
        {[["Open",openCnt],["Done",doneCnt],["Urgent",urgentCnt]].map(([lbl,val])=>(
          <div key={lbl} style={{textAlign:"center"}}>
            <p style={{color:"#fff",fontSize:22,fontWeight:800,margin:0,lineHeight:1}}>{val}</p>
            <p style={{color:"rgba(255,255,255,0.7)",fontSize:11,margin:0}}>{lbl}</p>
          </div>
        ))}
        <div style={{flex:1}}/>
        <div style={{display:"flex",gap:4}}>
          {["all","open","done"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{
              padding:"5px 12px",borderRadius:99,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
              background:filter===f?"rgba(255,255,255,0.25)":"transparent",
              color:filter===f?"#fff":"rgba(255,255,255,0.55)"
            }}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"14px 14px 0"}}>
        {loading && <p style={{textAlign:"center",color:"#78716C",padding:60,fontSize:15}}>Loading…</p>}
        {error   && <div style={{background:"#FEF2F2",borderRadius:10,padding:16,color:"#DC2626",fontSize:14}}>⚠ {error}</div>}

        {!loading&&!error&&Object.entries(grouped).map(([cat,catItems])=>{
          const isOpen   = collapsed[cat]!==true;
          const catOpen  = catItems.filter(i=>!isDone(i.completed)).length;
          const catDone  = catItems.filter(i=> isDone(i.completed)).length;
          const hasUrgent= catItems.some(i=>!isDone(i.completed)&&(isOverdue(i.due_date)||isSoon(i.due_date)));
          return (
            <div key={cat} style={{marginBottom:10,background:"#fff",borderRadius:14,overflow:"hidden",border:"0.5px solid #E7E5E4",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              <button onClick={()=>setCollapsed(p=>({...p,[cat]:!p[cat]}))} style={{
                width:"100%",background:"none",border:"none",cursor:"pointer",
                padding:"14px 16px",display:"flex",alignItems:"center",gap:10,textAlign:"left"
              }}>
                <span style={{fontSize:14,fontWeight:700,color:"#1C1917",flex:1}}>{cat}</span>
                {hasUrgent&&<span style={{fontSize:10,background:"#FEF2F2",color:"#DC2626",padding:"2px 8px",borderRadius:99,fontWeight:800}}>URGENT</span>}
                <span style={{fontSize:12,color:"#A8A29E"}}>{catOpen>0?`${catOpen} open`:""}{catOpen>0&&catDone>0?" · ":""}{catDone>0?`${catDone} done`:""}</span>
                <span style={{color:"#C4B5A0",fontSize:14,fontWeight:700}}>{isOpen?"▾":"▸"}</span>
              </button>

              {isOpen&&(
                <div style={{borderTop:"0.5px solid #F5F5F4"}}>
                  {catItems.length===0&&<p style={{color:"#C4B5A0",fontSize:13,padding:"12px 16px",margin:0,fontStyle:"italic"}}>Nothing here yet.</p>}
                  {catItems.map((item,idx)=>{
                    const done = isDone(item.completed);
                    return (
                      <div key={item.id} style={{
                        display:"flex",alignItems:"flex-start",gap:12,padding:"13px 16px",
                        borderTop:idx>0?"0.5px solid #F5F5F4":"none",
                        background:done?"#FAFAF9":"#fff"
                      }}>
                        {/* checkbox */}
                        <button onClick={()=>handleCheck(item)} style={{
                          width:22,height:22,borderRadius:6,flexShrink:0,marginTop:2,cursor:"pointer",
                          border:`2px solid ${done?oc.color:"#D6D3D1"}`,
                          background:done?oc.color:"transparent",
                          display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"
                        }}>
                          {done&&<span style={{color:"#fff",fontSize:12,fontWeight:900,lineHeight:1}}>✓</span>}
                        </button>

                        {/* body */}
                        <div style={{flex:1,minWidth:0}}>
                          {/* title — inline editable */}
                          <InlineTitle value={item.title} done={done}
                            onChange={v=>saveField(item.id,"title",v)}/>

                          {/* notes */}
                          {item.notes&&!done&&<p style={{margin:"4px 0 6px",fontSize:12,color:"#78716C",lineHeight:1.5}}>{item.notes}</p>}

                          {/* inline meta row — always visible */}
                          {!done&&(
                            <div style={{display:"flex",gap:10,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                              <InlineDate value={item.due_date} color={oc.color}
                                onChange={v=>saveField(item.id,"due_date",v)}/>
                              <InlineAssignee value={item.assigned_to} org={item.org} color={oc.color}
                                onChange={v=>saveField(item.id,"assigned_to",v)}/>
                            </div>
                          )}

                          {/* completion info */}
                          {done&&(
                            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                              <span style={{color:oc.color,fontWeight:700,fontSize:11}}>✓</span>
                              {item.completed_by&&<span style={{fontSize:11,fontWeight:600,color:"#78716C"}}>{item.completed_by}</span>}
                              {item.completed_at&&<span style={{fontSize:11,color:"#A8A29E"}}>· {fmtDateTime(item.completed_at)}</span>}
                            </div>
                          )}
                        </div>

                        {/* actions */}
                        <div style={{display:"flex",gap:2,flexShrink:0}}>
                          {!done&&<button onClick={()=>openEdit(item)} title="Edit notes/category" style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:6,color:"#D6D3D1",fontSize:13}}>✏️</button>}
                          <button onClick={()=>deleteItem(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:6,color:"#D6D3D1",fontSize:13}}>🗑</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* COMPLETE MODAL */}
      {modal?.mode==="complete"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:50,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div style={{background:"#fff",borderRadius:"22px 22px 0 0",width:"100%",padding:"24px 20px 40px"}}>
            <p style={{fontSize:12,color:"#A8A29E",margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>Marking complete</p>
            <p style={{fontSize:15,fontWeight:700,color:"#1C1917",margin:"0 0 20px",lineHeight:1.3}}>{modal.item.title}</p>
            <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Who completed this?</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
              {quickPeople.map(p=>(
                <button key={p} onClick={()=>setCompleteBy(p)} style={{
                  padding:"7px 14px",borderRadius:99,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
                  background:completeBy===p?oc.color:oc.light,color:completeBy===p?"#fff":oc.text
                }}>{p}</button>
              ))}
            </div>
            <input value={completeBy} onChange={e=>setCompleteBy(e.target.value)}
              placeholder="Or type a name (optional)…"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #E7E5E4",fontSize:14,color:"#1C1917",marginBottom:16}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={closeModal} style={{flex:1,padding:"13px",borderRadius:12,border:"1.5px solid #E7E5E4",background:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",color:"#78716C"}}>Cancel</button>
              <button onClick={confirmComplete} style={{flex:2,padding:"13px",borderRadius:12,border:"none",background:oc.color,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>
                ✓ Mark complete{completeBy?` — ${completeBy}`:""}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ADD / EDIT MODAL — for notes and category only */}
      {(modal?.mode==="add"||modal?.mode==="edit")&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:50,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div style={{background:"#fff",borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"92vh",overflow:"auto",padding:"24px 20px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#1C1917"}}>{modal.mode==="edit"?"Edit item":"New item"}</h2>
              <button onClick={closeModal} style={{background:"#F5F5F4",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,color:"#78716C",fontWeight:600}}>Cancel</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {/* org */}
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Organization</label>
                <div style={{display:"flex",gap:8}}>
                  {Object.entries(ORGS).map(([key,o])=>(
                    <button key={key} onClick={()=>setForm(f=>({...f,org:key,category:CATEGORIES[key][0]}))} style={{
                      flex:1,padding:"10px 8px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,
                      border:`2px solid ${form.org===key?o.color:"#E7E5E4"}`,
                      background:form.org===key?o.light:"#fff",color:form.org===key?o.text:"#78716C"
                    }}>{o.label}</button>
                  ))}
                </div>
              </div>
              {/* category */}
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Category</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                  style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #E7E5E4",fontSize:14,color:"#1C1917",background:"#fff"}}>
                  {formCats.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              {/* title */}
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Title *</label>
                <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                  placeholder="What needs to happen?"
                  style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #E7E5E4",fontSize:14,color:"#1C1917"}}/>
              </div>
              {/* notes */}
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Notes</label>
                <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                  placeholder="Details, links, context…" rows={3}
                  style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #E7E5E4",fontSize:14,color:"#1C1917",resize:"vertical"}}/>
              </div>
              {/* due date + assigned — also in modal for new items */}
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Due date</label>
                  <input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}
                    style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #E7E5E4",fontSize:14,color:"#1C1917"}}/>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Assigned to</label>
                  <input value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))}
                    placeholder="Name"
                    style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #E7E5E4",fontSize:14,color:"#1C1917"}}/>
                </div>
              </div>
              <button onClick={saveItem} disabled={saving||!form.title.trim()} style={{
                background:ORGS[form.org||org].color,color:"#fff",border:"none",borderRadius:12,
                padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",marginTop:4,
                opacity:saving||!form.title.trim()?0.5:1
              }}>{saving?"Saving…":modal.mode==="edit"?"Save changes":"Add item"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
