<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F7F4; overflow: hidden; }
input, select, textarea, button { font-family: inherit; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 220px; min-width: 220px; background: #1C1917; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-sub  { font-size: 10px; color: #A8A29E; letter-spacing: 0.12em; text-transform: uppercase; margin: 0; }
.sidebar-title { font-size: 18px; font-weight: 800; color: #FAFAF9; margin: 0; letter-spacing: -0.02em; }
.org-tabs { display: flex; gap: 0; padding: 10px 10px 0; }
.org-tab { flex: 1; padding: 7px 4px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; border-radius: 7px 7px 0 0; transition: all 0.15s; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0 20px; }
.sidebar-nav::-webkit-scrollbar { width: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 16px; cursor: pointer; transition: background 0.12s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: rgba(255,255,255,0.06); }
.nav-item.active { background: rgba(255,255,255,0.12); }
.nav-label { font-size: 13px; font-weight: 600; color: #E7E5E4; }
.nav-item.active .nav-label { color: #fff; }
.nav-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 99px; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #fff; border-bottom: 0.5px solid #E7E5E4; flex-shrink: 0; }
.topbar-title { font-size: 20px; font-weight: 800; color: #1C1917; }
.topbar-meta  { font-size: 12px; color: #A8A29E; margin-top: 2px; }
.content { flex: 1; overflow-y: auto; padding: 16px 20px 40px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 2px; }

/* STATS ROW */
.stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
.stat-card { flex: 1; background: #fff; border: 0.5px solid #E7E5E4; border-radius: 10px; padding: 10px 14px; text-align: center; }
.stat-num   { font-size: 22px; font-weight: 800; line-height: 1; }
.stat-lbl   { font-size: 11px; color: #A8A29E; margin-top: 2px; }

/* ITEMS */
.item-card { background: #fff; border: 0.5px solid #E7E5E4; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
.item-row  { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; }
.item-row + .item-row { border-top: 0.5px solid #F5F5F4; }
.item-row.done-row { background: #FAFAF9; }
.check-btn { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.item-body { flex: 1; min-width: 0; }
.item-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin: 0; }
.item-notes { font-size: 12px; color: #78716C; line-height: 1.5; margin: 4px 0 0; }
.item-meta  { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.item-actions { display: flex; gap: 2px; flex-shrink: 0; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; color: #D6D3D1; font-size: 14px; }
.done-info { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 11px; }

/* INLINE EDITING */
.inline-title { border: none; background: transparent; font-size: 14px; font-weight: 600; padding: 0; width: 100%; line-height: 1.4; color: #1C1917; }
.inline-title:focus { outline: none; border-bottom: 1.5px solid #D6D3D1; }
.inline-date-input { border: none; font-size: 11px; font-weight: 700; color: inherit; padding: 2px 8px; border-radius: 99px; width: 130px; cursor: pointer; }
.inline-date-input:focus { outline: none; }
.inline-name-input { border: none; border-bottom: 1.5px solid #D6D3D1; background: transparent; font-size: 11px; font-weight: 500; color: #78716C; padding: 1px 2px; width: 100px; }
.inline-name-input:focus { outline: none; }
.date-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; border: 1px dashed transparent; }
.assign-text { font-size: 11px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; padding-bottom: 1px; }
.people-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.people-pill { padding: 3px 10px; border-radius: 99px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; }

/* MODAL */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; display: flex; align-items: flex-end; }
.modal-sheet { background: #fff; border-radius: 22px 22px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding: 24px 20px 40px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-title { margin: 0; font-size: 18px; font-weight: 800; color: #1C1917; }
.modal-cancel { background: #F5F5F4; border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: #78716C; font-weight: 600; }
.field-group { display: flex; flex-direction: column; gap: 16px; }
.field-lbl { font-size: 11px; font-weight: 700; color: #78716C; display: block; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.06em; }
.field-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid #E7E5E4; font-size: 14px; color: #1C1917; background: #fff; }
.field-textarea { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid #E7E5E4; font-size: 14px; color: #1C1917; resize: vertical; }
.field-row { display: flex; gap: 12px; }
.save-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
.org-btn { flex: 1; padding: 10px 8px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; }

/* HAMBURGER — mobile */
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: #FAFAF9; font-size: 22px; }
.sidebar-overlay { display: none; }

@media (max-width: 680px) {
  .sidebar { position: fixed; left: -220px; top: 0; bottom: 0; z-index: 40; transition: left 0.25s; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { display: block; position: fixed; inset: 0; z-index: 39; background: rgba(0,0,0,0.4); }
  .hamburger { display: block; }
  .topbar { padding: 10px 14px; }
  .stats-row { gap: 6px; }
  .stat-card { padding: 8px 10px; }
}
</style>
</head>

// ── Turso ──
async function tursoQuery(sql, args=[]) {
  const res = await fetch(`${TURSO_URL}/v2/pipeline`, {
    method:"POST",
    headers:{ Authorization:`Bearer ${TURSO_TOKEN}`, "Content-Type":"application/json" },
    body: JSON.stringify({ requests:[
      { type:"execute", stmt:{ sql, args: args.map(v => v===null?{type:"null"}:{type:"text",value:String(v)}) } },
      { type:"close" }
    ]})
  });
  const data = await res.json();
  if (data.results?.[0]?.type==="error") throw new Error(data.results[0].error.message);
  return data.results?.[0]?.response?.result;
}
function toObjects(result) {
  if (!result?.rows) return [];
  const cols = result.cols.map(c=>c.name);
  return result.rows.map(row => { const o={}; cols.forEach((c,i)=>{ o[c]=row[i]?.value??null; }); return o; });
}

// ── Helpers ──
function fmtDate(d)     { if(!d)return null; return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function fmtDT(d)       { if(!d)return null; return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function isOverdue(d)   { return d && new Date(d+"T23:59:59") < new Date(); }
function isSoon(d)      { if(!d)return false; const df=new Date(d+"T23:59:59")-new Date(); return df>0&&df<1000*60*60*24*7; }
function isDone(v)      { return v==="1"||v===1; }
function nowISO()       { return new Date().toISOString(); }

// ── Notes renderer — makes URLs clickable ──
function NotesDisplay({ text }) {
  if (!text) return null;
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const lines = text.split('\n');
  return (
    <p className="item-notes" style={{whiteSpace:'pre-wrap'}}>
      {lines.map((line, li) => {
        const parts = line.split(urlRegex);
        return (
          <span key={li}>
            {li > 0 && '\n'}
            {parts.map((part, pi) =>
              urlRegex.test(part)
                ? <a key={pi} href={part} target="_blank" rel="noopener noreferrer"
                    style={{color:'#7C3AED',textDecoration:'underline',wordBreak:'break-all'}}
                    onClick={e=>e.stopPropagation()}>{part}</a>
                : part
            )}
          </span>
        );
      })}
    </p>
  );
}

// ── Inline date ──
function InlineDate({ value, onChange, color }) {
  const [editing,setEditing]=React.useState(false);
  const [local,setLocal]=React.useState(value||"");
  const ov=isOverdue(value), so=isSoon(value);
  const commit=()=>{setEditing(false);if(local!==(value||""))onChange(local||null);};
  const bg=ov?"#FEF2F2":so?"#FFFBEB":value?"#F5F5F4":"#F5F5F4";
  const clr=ov?"#DC2626":so?"#D97706":value?"#78716C":"#C4B5A0";
  if(editing) return <input type="date" className="inline-date-input" value={local} onChange={e=>setLocal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()} autoFocus style={{background:bg,color:clr,border:`1.5px solid ${color}`}}/>;
  return <span className="date-badge" onClick={()=>{setLocal(value||"");setEditing(true);}} style={{background:bg,color:clr,border:`1px dashed ${value?"transparent":"#D6D3D1"}`}}>{ov?"⚠ ":so?"⏰ ":""}{value?fmtDate(value):"Add date"}</span>;
}

// ── Inline assignee ──
function InlineAssignee({ value, org, onChange, color }) {
  const [editing,setEditing]=React.useState(false);
  const [local,setLocal]=React.useState(value||"");
  const people=PEOPLE[org]||[];
  const commit=(val)=>{ const v=val!==undefined?val:local; setEditing(false); if(v!==(value||""))onChange(v||null); };
  if(editing) return (
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      <div className="people-pills">{people.map(p=><button key={p} className="people-pill" onMouseDown={()=>commit(p)} style={{background:local===p?color:"#F5F5F4",color:local===p?"#fff":"#78716C"}}>{p}</button>)}</div>
      <input className="inline-name-input" value={local} onChange={e=>setLocal(e.target.value)} onBlur={()=>commit()} onKeyDown={e=>e.key==="Enter"&&commit()} placeholder="Other…" autoFocus/>
    </div>
  );
  return <span className="assign-text" onClick={()=>{setLocal(value||"");setEditing(true);}} style={{color:value?"#78716C":"#C4B5A0",borderBottom:`1px dashed ${value?"transparent":"#D6D3D1"}`}}>{value?`→ ${value}`:"Assign…"}</span>;
}

// ── Inline title ──
function InlineTitle({ value, done, onChange }) {
  const [editing,setEditing]=React.useState(false);
  const [local,setLocal]=React.useState(value);
  const commit=()=>{setEditing(false);if(local.trim()&&local!==value)onChange(local.trim());else setLocal(value);};
  if(editing) return <input className="inline-title" value={local} onChange={e=>setLocal(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setLocal(value);setEditing(false);}}} autoFocus/>;
  return <p className="item-title" onClick={()=>!done&&setEditing(true)} style={{color:done?"#A8A29E":"#1C1917",textDecoration:done?"line-through":"none",cursor:done?"default":"text"}}>{value}</p>;
}

// ── Member completion tracker ──
function MemberTracker({ item, orgColor }) {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  const loadRows = React.useCallback(async () => {
    setLoading(true);
    try {
      // load active members from roster
      const mr = await tursoQuery("SELECT first_name FROM bpwt_roster WHERE active=1 ORDER BY tri_due ASC, last_name ASC");
      const activeMembers = mr?.rows ? mr.rows.map(r=>r[0]?.value) : [];
      for (const m of activeMembers) {
        await tursoQuery("INSERT OR IGNORE INTO member_completions (item_id,member_name,completed) VALUES (?,?,0)",[item.id,m]);
      }
      const r = await tursoQuery("SELECT * FROM member_completions WHERE item_id=? ORDER BY id ASC",[item.id]);
      if (r?.rows) {
        const cols=r.cols.map(c=>c.name);
        setRows(r.rows.map(row=>{const o={};cols.forEach((c,i)=>{o[c]=row[i]?.value??null;});return o;}));
      }
    } finally { setLoading(false); }
  },[item.id]);

  React.useEffect(()=>{loadRows();},[loadRows]);

  const toggle=async(row)=>{
    const nv=(row.completed==="1"||row.completed===1)?0:1;
    const nd=nv?new Date().toISOString().split("T")[0]:null;
    setRows(p=>p.map(r=>r.member_name===row.member_name?{...r,completed:nv,completed_date:nd}:r));
    await tursoQuery("UPDATE member_completions SET completed=?,completed_date=? WHERE item_id=? AND member_name=?",[String(nv),nd,item.id,row.member_name]);
  };
  const setDate=async(row,date)=>{
    setRows(p=>p.map(r=>r.member_name===row.member_name?{...r,completed_date:date||null}:r));
    await tursoQuery("UPDATE member_completions SET completed_date=? WHERE item_id=? AND member_name=?",[date||null,item.id,row.member_name]);
  };

  if(loading)return<p style={{fontSize:11,color:"#A8A29E",padding:"8px 0"}}>Loading…</p>;
  const doneCount=rows.filter(r=>r.completed==="1"||r.completed===1).length;

  return(
    <div style={{marginTop:10,borderTop:"0.5px solid #F5F5F4",paddingTop:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <p style={{fontSize:11,fontWeight:700,color:"#A8A29E",textTransform:"uppercase",letterSpacing:"0.06em",margin:0}}>Member tracking</p>
        <span style={{fontSize:11,fontWeight:700,color:orgColor}}>{doneCount}/{rows.length} completed</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {rows.map(row=>{
          const dn=row.completed==="1"||row.completed===1;
          return(
            <div key={row.member_name} style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>toggle(row)} style={{
                width:18,height:18,borderRadius:4,flexShrink:0,cursor:"pointer",
                border:"2px solid "+(dn?orgColor:"#D6D3D1"),background:dn?orgColor:"transparent",
                display:"flex",alignItems:"center",justifyContent:"center"
              }}>
                {dn&&<span style={{color:"#fff",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
              </button>
              <span style={{fontSize:13,fontWeight:500,color:dn?"#A8A29E":"#1C1917",width:72,flexShrink:0,textDecoration:dn?"line-through":"none"}}>{row.member_name}</span>
              <input type="date" value={row.completed_date||""} onChange={e=>setDate(row,e.target.value)}
                style={{fontSize:11,padding:"2px 6px",borderRadius:6,border:"1px solid #E7E5E4",
                  color:row.completed_date?"#78716C":"#C4B5A0",background:dn?"#F5F5F4":"#fff",flex:1,maxWidth:140}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

                    {m.birthday&&<p style={{margin:0,fontSize:11,color:"#A8A29E"}}>🎂 {m.birthday}</p>}
                    {m.join_date&&<p style={{margin:0,fontSize:11,color:"#A8A29E"}}>Joined {new Date(m.join_date+"T12:00:00").toLocaleDateString("en-US",{month:"short",year:"numeric"})}</p>}
                  </div>
                </div>
                <button onClick={()=>openEdit(m)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",color:"#A8A29E",fontSize:14}}>✏️</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Add/Edit modal */}
      {showAdd&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:50,display:"flex",alignItems:"flex-end"}} onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
          <div style={{background:"#fff",borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"92vh",overflow:"auto",padding:"24px 20px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#1C1917"}}>{editId?"Edit member":"Add member"}</h2>
              <button onClick={()=>setShowAdd(false)} style={{background:"#F5F5F4",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:14,color:"#78716C",fontWeight:600}}>Cancel</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>First name *</label>
                  <input value={form.first} onChange={e=>setForm(f=>({...f,first:e.target.value}))} className="field-input" placeholder="First"/>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Last name</label>
                  <input value={form.last} onChange={e=>setForm(f=>({...f,last:e.target.value}))} className="field-input" placeholder="Last"/>
                </div>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Email</label>
                <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} className="field-input" placeholder="email@example.com"/>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Phone</label>
                <input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} className="field-input" placeholder="507-000-0000"/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Tri due</label>
                  <select value={form.tri_due} onChange={e=>setForm(f=>({...f,tri_due:e.target.value}))} className="field-input">
                    <option value="1">Tri 1</option>
                    <option value="2">Tri 2</option>
                    <option value="3">Tri 3</option>
                  </select>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Join date</label>
                  <input type="date" value={form.join_date} onChange={e=>setForm(f=>({...f,join_date:e.target.value}))} className="field-input"/>
                </div>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#78716C",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Birthday (MM/DD)</label>
                <input value={form.birthday} onChange={e=>setForm(f=>({...f,birthday:e.target.value}))} className="field-input" placeholder="06/25"/>
              </div>
              <button onClick={save} disabled={saving||!form.first.trim()} style={{background:color,color:"#fff",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",opacity:saving||!form.first.trim()?0.5:1}}>
                {saving?"Saving…":editId?"Save changes":"Add member"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ──
function App() {
  const [org,setOrg]               = React.useState(()=>localStorage.getItem("cc_org")||"bpwt");
  const [activeCat,setActiveCat]   = React.useState(()=>{
    const savedOrg=localStorage.getItem("cc_org")||"bpwt";
    const savedCat=localStorage.getItem("cc_cat");
    const cats=CATEGORIES[savedOrg]||CATEGORIES.bpwt;
    return (savedCat&&cats.includes(savedCat))?savedCat:cats[0];
  });
  const [items,setItems]           = React.useState([]);
  const [loading,setLoading]       = React.useState(true);
  const [error,setError]           = React.useState(null);
  const [filter,setFilter]         = React.useState("open");
  const [sidebarOpen,setSidebar]   = React.useState(false);
  const [modal,setModal]           = React.useState(null);
  const [form,setForm]             = React.useState({});
  const [saving,setSaving]         = React.useState(false);
  const [completeBy,setCompleteBy] = React.useState("");

  const load = React.useCallback(async()=>{
    try { setLoading(true); await initDB();
      const r=await tursoQuery("SELECT * FROM command_center_items ORDER BY completed ASC, due_date ASC, created_at ASC");
      setItems(toObjects(r)); setError(null);
    } catch(e){setError(e.message);} finally{setLoading(false);}
  },[]);
  React.useEffect(()=>{load();},[load]);

  const saveField=async(id,field,value)=>{
    setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:value}:i));
    await tursoQuery(`UPDATE command_center_items SET ${field}=? WHERE id=?`,[value,id]);
  };

  const handleCheck=(item)=>{ if(isDone(item.completed))uncomplete(item); else{setCompleteBy(item.assigned_to||"");setModal({mode:"complete",item});} };
  const uncomplete=async(item)=>{ setItems(prev=>prev.map(i=>i.id===item.id?{...i,completed:0,completed_by:null,completed_at:null}:i)); await tursoQuery("UPDATE command_center_items SET completed=0,completed_by=NULL,completed_at=NULL WHERE id=?",[item.id]); };
  const confirmComplete=async()=>{ const item=modal.item,by=completeBy.trim()||null,at=nowISO(); setItems(prev=>prev.map(i=>i.id===item.id?{...i,completed:1,completed_by:by,completed_at:at}:i)); await tursoQuery("UPDATE command_center_items SET completed=1,completed_by=?,completed_at=? WHERE id=?",[by,at,item.id]); setModal(null); };

  const openAdd=()=>{setForm({org,category:activeCat,title:"",notes:"",due_date:"",assigned_to:""});setModal({mode:"add"});};
  const openEdit=(item)=>{setForm({org:item.org,category:item.category,title:item.title,notes:item.notes||"",due_date:item.due_date||"",assigned_to:item.assigned_to||""});setModal({mode:"edit",item});};
  const closeModal=()=>setModal(null);
  const saveItem=async()=>{
    if(!form.title.trim())return; setSaving(true);
    try {
      if(modal.mode==="edit") await tursoQuery("UPDATE command_center_items SET org=?,category=?,title=?,notes=?,due_date=?,assigned_to=? WHERE id=?",[form.org,form.category,form.title,form.notes||null,form.due_date||null,form.assigned_to||null,modal.item.id]);
      else await tursoQuery("INSERT INTO command_center_items (org,category,title,notes,due_date,assigned_to,completed) VALUES (?,?,?,?,?,?,0)",[form.org,form.category,form.title,form.notes||null,form.due_date||null,form.assigned_to||null]);
      await load(); closeModal();
    } finally{setSaving(false);}
  };
  const deleteItem=async(id)=>{ if(!confirm("Delete this item?"))return; await tursoQuery("DELETE FROM command_center_items WHERE id=?",[id]); setItems(prev=>prev.filter(i=>i.id!==id)); };

  const switchOrg=(key)=>{ setOrg(key); setActiveCat(CATEGORIES[key][0]); setSidebar(false); localStorage.setItem("cc_org",key); localStorage.setItem("cc_cat",CATEGORIES[key][0]); };
  const pickCat=(cat)=>{ setActiveCat(cat); setSidebar(false); localStorage.setItem("cc_cat",cat); };

  const oc=ORGS[org];
  const cats=CATEGORIES[org];
  const orgItems=items.filter(i=>i.org===org);

  // per-category counts for badges
  const catCounts={};
  cats.forEach(c=>{ const ci=orgItems.filter(i=>i.category===c); catCounts[c]={ open:ci.filter(i=>!isDone(i.completed)).length, urgent:ci.some(i=>!isDone(i.completed)&&(isOverdue(i.due_date)||isSoon(i.due_date))) }; });

  // active page items
  const pageItems=orgItems.filter(i=>i.category===activeCat);
  const displayed=filter==="all"?pageItems:filter==="open"?pageItems.filter(i=>!isDone(i.completed)):pageItems.filter(i=>isDone(i.completed));
  const pageOpen=pageItems.filter(i=>!isDone(i.completed)).length;
  const pageDone=pageItems.filter(i=> isDone(i.completed)).length;
  const pageUrgent=pageItems.filter(i=>!isDone(i.completed)&&(isOverdue(i.due_date)||isSoon(i.due_date))).length;

  const totalOpen=orgItems.filter(i=>!isDone(i.completed)).length;
  const formCats=CATEGORIES[form.org||org];
  const quickPeople=PEOPLE[modal?.item?.org||org]||[];

  return (
    <div className="app">
      {/* SIDEBAR OVERLAY (mobile) */}
      {sidebarOpen && <div className="sidebar-overlay" onClick={()=>setSidebar(false)}/>}

      {/* SIDEBAR */}
      <aside className={`sidebar${sidebarOpen?" open":""}`}>
        <div className="sidebar-header">
          <p className="sidebar-sub">Jen's</p>
          <h1 className="sidebar-title">Command Center</h1>
          <p style={{fontSize:11,color:"#78716C",marginTop:4}}>{totalOpen} open items</p>
        </div>

        {/* Org tabs */}
        <div className="org-tabs">
          {Object.entries(ORGS).map(([key,o])=>(
            <button key={key} className="org-tab" onClick={()=>switchOrg(key)} style={{background:org===key?o.color:"transparent",color:org===key?"#fff":"#78716C"}}>{o.label}</button>
          ))}
        </div>

        {/* Nav */}
        <nav className="sidebar-nav">
          {cats.map(cat=>{
            const cc=catCounts[cat]||{open:0,urgent:false};
            return (
              <button key={cat} className={`nav-item${activeCat===cat?" active":""}`} onClick={()=>pickCat(cat)}>
                <span className="nav-label">{cat}</span>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  {cc.urgent && <span style={{width:6,height:6,borderRadius:99,background:"#DC2626",flexShrink:0}}/>}
                  {cc.open>0 && <span className="nav-badge" style={{background:activeCat===cat?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.08)",color:activeCat===cat?"#fff":"#A8A29E"}}>{cc.open}</span>}
                </div>
              </button>
            );
          })}
        </nav>
        <AddCategoryBar org={org} onAdd={(cat)=>{
          if(!CATEGORIES[org].includes(cat)){
            CATEGORIES[org]=[...CATEGORIES[org],cat];
            setActiveCat(cat);
            localStorage.setItem("cc_cat",cat);
            setSidebar(false);
          }
        }}/>
      </aside>

      {/* MAIN */}
      <main className="main">
        {/* TOPBAR */}
        <div className="topbar">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button className="hamburger" onClick={()=>setSidebar(s=>!s)}>☰</button>
            <div>
              <p className="topbar-title">{activeCat}</p>
              <p className="topbar-meta">{org==="bpwt"?"BPWT":"Blossom Thyme"} · {pageOpen} open{pageUrgent>0?` · ${pageUrgent} urgent`:""}</p>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {["all","open","done"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)} style={{padding:"5px 11px",borderRadius:99,border:`1.5px solid ${filter===f?oc.color:"#E7E5E4"}`,background:filter===f?oc.color:"#fff",color:filter===f?"#fff":"#78716C",fontSize:12,fontWeight:600,cursor:"pointer"}}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
            ))}
            <button onClick={openAdd} style={{background:oc.color,color:"#fff",border:"none",borderRadius:9,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",marginLeft:4}}>+ Add</button>
          </div>
        </div>

        {/* CONTENT */}
        <div className="content">
          {/* Stats */}
          {!ROSTER_CATEGORIES.includes(activeCat)&&<div className="stats-row">
            {[["Open",pageOpen,oc.color],["Done",pageDone,"#16A34A"],["Urgent",pageUrgent,"#DC2626"]].map(([lbl,val,clr])=>(
              <div key={lbl} className="stat-card">
                <p className="stat-num" style={{color:clr}}>{val}</p>
                <p className="stat-lbl">{lbl}</p>
              </div>
            ))}
          </div>}

          {loading && <p style={{textAlign:"center",color:"#78716C",padding:60}}>Loading…</p>}
          {error   && <div style={{background:"#FEF2F2",borderRadius:10,padding:16,color:"#DC2626",fontSize:14,marginBottom:12}}>⚠ {error}</div>}
          {ROSTER_CATEGORIES.includes(activeCat) && !loading && <RosterView color={oc.color}/>}

          {!loading&&!error&&!ROSTER_CATEGORIES.includes(activeCat)&&(
            displayed.length===0
              ? <div style={{textAlign:"center",padding:"60px 20px",color:"#A8A29E"}}>
                  <p style={{fontSize:32,marginBottom:8}}>✓</p>
                  <p style={{fontSize:15,fontWeight:600}}>{filter==="open"?"All done!":"No items"}</p>
                  <p style={{fontSize:13,marginTop:4}}>{filter==="open"?"Nothing open in this section.":"Nothing to show."}</p>
                </div>
              : <div className="item-card">
                  {displayed.map((item,idx)=>{
                    const done=isDone(item.completed);
                    return (
                      <div key={item.id} className={`item-row${done?" done-row":""}`}>
                        {!NOMINATION_CATEGORIES.includes(item.category) && (
                          <button className="check-btn" onClick={()=>handleCheck(item)} style={{border:`2px solid ${done?oc.color:"#D6D3D1"}`,background:done?oc.color:"transparent"}}>
                            {done&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                          </button>
                        )}
                        <div className="item-body">
                          <InlineTitle value={item.title} done={!NOMINATION_CATEGORIES.includes(item.category)&&done} onChange={v=>saveField(item.id,"title",v)}/>
                          {item.notes&&<NotesDisplay text={item.notes}/>}
                          {MEMBER_SELF_CATEGORIES.includes(item.category)&&(
                            <MemberTracker item={item} orgColor={oc.color}/>
                          )}
                          {!NOMINATION_CATEGORIES.includes(item.category)&&!done&&(
                            <div className="item-meta">
                              <InlineDate value={item.due_date} color={oc.color} onChange={v=>saveField(item.id,"due_date",v)}/>
                              <InlineAssignee value={item.assigned_to} org={item.org} color={oc.color} onChange={v=>saveField(item.id,"assigned_to",v)}/>
                            </div>
                          )}
                          {!NOMINATION_CATEGORIES.includes(item.category)&&done&&(
                            <div className="done-info">
                              <span style={{color:oc.color,fontWeight:700}}>✓</span>
                              {item.completed_by&&<span style={{fontWeight:600,color:"#78716C"}}>{item.completed_by}</span>}
                              {item.completed_at&&<span style={{color:"#A8A29E"}}>· {fmtDT(item.completed_at)}</span>}
                            </div>
                          )}
                          {NOMINATION_CATEGORIES.includes(item.category)&&(
                            <div style={{marginTop:6}}>
                              <span style={{fontSize:11,color:"#A8A29E",fontStyle:"italic"}}>Edit notes above to record who was nominated and when</span>
                            </div>
                          )}
                        </div>
                        <div className="item-actions">
                          {!done&&<button className="icon-btn" onClick={()=>openEdit(item)}>✏️</button>}
                          <button className="icon-btn" onClick={()=>deleteItem(item.id)}>🗑</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
          )}
        </div>
      </main>

      {/* COMPLETE MODAL */}
      {modal?.mode==="complete"&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div className="modal-sheet">
            <p style={{fontSize:12,color:"#A8A29E",margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700}}>Marking complete</p>
            <p style={{fontSize:15,fontWeight:700,color:"#1C1917",margin:"0 0 20px",lineHeight:1.3}}>{modal.item.title}</p>
            <label className="field-lbl">Who completed this?</label>
            <div className="people-pills" style={{marginBottom:12}}>
              {quickPeople.map(p=><button key={p} className="people-pill" onClick={()=>setCompleteBy(p)} style={{background:completeBy===p?oc.color:oc.light,color:completeBy===p?"#fff":oc.text,padding:"7px 14px",fontSize:13}}>{p}</button>)}
            </div>
            <input value={completeBy} onChange={e=>setCompleteBy(e.target.value)} placeholder="Or type a name (optional)…" className="field-input" style={{marginBottom:16}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={closeModal} style={{flex:1,padding:"13px",borderRadius:12,border:"1.5px solid #E7E5E4",background:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",color:"#78716C"}}>Cancel</button>
              <button onClick={confirmComplete} style={{flex:2,padding:"13px",borderRadius:12,border:"none",background:oc.color,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>✓ Mark complete{completeBy?` — ${completeBy}`:""}</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD/EDIT MODAL */}
      {(modal?.mode==="add"||modal?.mode==="edit")&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div className="modal-sheet">
            <div className="modal-header">
              <h2 className="modal-title">{modal.mode==="edit"?"Edit item":"New item"}</h2>
              <button className="modal-cancel" onClick={closeModal}>Cancel</button>
            </div>
            <div className="field-group">
              <div>
                <label className="field-lbl">Organization</label>
                <div style={{display:"flex",gap:8}}>
                  {Object.entries(ORGS).map(([key,o])=>(
                    <button key={key} className="org-btn" onClick={()=>setForm(f=>({...f,org:key,category:CATEGORIES[key][0]}))} style={{border:`2px solid ${form.org===key?o.color:"#E7E5E4"}`,background:form.org===key?o.light:"#fff",color:form.org===key?o.text:"#78716C"}}>{o.label}</button>
                  ))}
                </div>
              </div>
              <div>
                <label className="field-lbl">Category</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} className="field-input">
                  {formCats.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className="field-lbl">Title *</label>
                <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="What needs to happen?" className="field-input"/>
              </div>
              <div>
                <label className="field-lbl">Notes</label>
                <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Details, links, context…" rows={3} className="field-textarea"/>
              </div>
              <div className="field-row">
                <div style={{flex:1}}>
                  <label className="field-lbl">Due date</label>
                  <input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))} className="field-input"/>
                </div>
                <div style={{flex:1}}>
                  <label className="field-lbl">Assigned to</label>
                  <input value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} placeholder="Name" className="field-input"/>
                </div>
              </div>
              <button onClick={saveItem} disabled={saving||!form.title.trim()} className="save-btn" style={{background:ORGS[form.org||org].color,opacity:saving||!form.title.trim()?0.5:1}}>
                {saving?"Saving…":modal.mode==="edit"?"Save changes":"Add item"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
